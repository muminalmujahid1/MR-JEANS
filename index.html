<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MRJEANS</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #0f172a; /* ডার্ক প্রিমিয়াম কালার */
            --primary: #2563eb; /* রয়্যাল ব্লু */
            --text: #0f172a;
            --muted: #64748b;
            --whatsapp: #22c55e;
            --facebook: #1877F2;
            --imo: #00a0ff;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* গর্জিয়াস গ্রেডিয়েন্ট হেডার */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.15);
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 80%);
            pointer-events: none;
        }
        .logo-img { 
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; 
            border: 4px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        header h1 { font-size: 38px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .subtitle { 
            background: rgba(255, 255, 255, 0.15); display: inline-block; padding: 6px 16px;
            border-radius: 20px; color: #f8fafc; font-size: 14px; margin-top: 10px; font-weight: 600; 
            backdrop-filter: blur(5px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }

        /* প্রোডাক্ট গ্রিড এরিয়া */
        .wrap { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid-title { text-align: center; margin-bottom: 35px; color: var(--text); font-size: 28px; font-weight: 700; }
        .grid-title::after { content: ''; display: block; width: 60px; height: 4px; background: var(--primary); margin: 10px auto 0 auto; border-radius: 2px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 25px;
        }
        
        /* প্রিমিয়াম প্রোডাক্ট কার্ড এবং জুম ইফেক্ট */
        .product-card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px rgba(15, 23, 42, 0.08);
        }
        .img-container { width: 100%; height: 320px; overflow: hidden; position: relative; background: #f1f5f9; }
        .product-card img { 
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.5s ease;
        }
        .product-card:hover img { transform: scale(1.06); }
        
        .product-info { padding: 20px; text-align: center; display: flex; flex-direction: column; flex-grow: 1; justify-content: center; }
        .product-name { font-size: 19px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        
        /* ডেসক্রিপশন ব্যাজ */
        .product-desc { 
            font-size: 13px; color: #475569;
            background: #f1f5f9; padding: 6px 12px; border-radius: 8px; display: inline-block; font-weight: 500;
        }

        /* মেইন সোশ্যাল মিডিয়া বাটন সেকশন */
        .contact-section {
            background: #fff;
            padding: 40px 20px;
            text-align: center;
            margin-top: 60px;
            border-top: 1px solid #e2e8f0;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.01);
        }
        .contact-section h3 { margin-bottom: 20px; font-size: 22px; font-weight: 700; color: #1e293b; }
        
        .social-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social-btn {
            display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px;
            border-radius: 50px; color: #fff; text-decoration: none; font-weight: 700; font-size: 15px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1); transition: all 0.2s ease;
        }
        .social-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-wa { background: var(--whatsapp); box-shadow: 0 4px 14px rgba(34, 197, 94, 0.2); }
        .btn-wa:hover { background: #16a34a; }
        .btn-fb { background: var(--facebook); box-shadow: 0 4px 14px rgba(24, 119, 242, 0.2); }
        .btn-fb:hover { background: #1464cc; }
        .btn-imo { background: var(--imo); box-shadow: 0 4px 14px rgba(0, 160, 255, 0.2); }
        .btn-imo:hover { background: #008be0; }

        /* ফুটার */
        footer { text-align: center; padding: 25px 16px; color: var(--muted); font-size: 14px; background: #0f172a; color: #94a3b8; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/3JHb4B7Y/Untitled-design-(3).png" alt="MRJEANS Logo" class="logo-img">
    <h1>MR-JEANS</h1>
    <div class="subtitle">📦 পাইকারি ও হোলসেল বিক্রেতা 📦</div>
</header>

<main class="wrap">
    <h2 class="grid-title">আমাদের এক্সক্লুসিভ কালেকশন</h2>
    <div id="products" class="products-grid"></div>
</main>

<section class="contact-section">
    <h3>সরাসরি কারখানা রেটে কিনতে নিচে যোগাযোগ করুন:</h3>
    <div class="social-container">
        <a href="https://wa.me/8801300031645" target="_blank" class="social-btn btn-wa">💬 হোয়াটসঅ্যাপ</a>
        <a href="https://www.facebook.com/mrjeansbd.bd/" target="_blank" class="social-btn btn-fb">👍 ফেসবুক পেজ</a>
        <a href="tel:+8801300031645" class="social-btn btn-imo">📞 সরাসরি কল করুন</a>
    </div>
</section>

<footer>
    <p>© 2026 MRJEANS Wholesale. সর্বস্বত্ব সংরক্ষিত।</p>
</footer>

<script>
// আপনার প্রোডাক্টের লিস্ট
const MY_PRODUCTS = [
  {
    title: "প্রিমিয়াম জিন্স প্যান্ট",
    img: "https://i.postimg.cc/mgfCjXkp/Gemini-Generated-Image-2zfhjy2zfhjy2zfh.png", 
    desc: "পাইকারি রেট জানতে যোগাযোগ করুন"
  },
  {
    title: "ব্ল্যাক ডেনিম প্যান্ট",
    img: "https://i.postimg.cc/wvpsc7B7/Gemini-Generated-Image-ij1jcaij1jcaij1j.png",
    desc: "পাইকারি রেট জানতে যোগাযোগ করুন"
  },
  {
    title: "স্লিম ফিট জিন্স",
    img: "https://i.postimg.cc/vHgHTGQk/Gemini-Generated-Image-lb9qlvlb9qlvlb9q.png",
    desc: "পাইকারি রেট জানতে যোগাযোগ করুন"
  },
  {
    title: "স্টাইলিশ গ্যাবার্ডিন",
    img: "https://i.postimg.cc/mgfCjXkp/Gemini-Generated-Image-2zfhjy2zfhjy2zfh.png",
    desc: "পাইকারি রেট জানতে যোগাযোগ করুন"
  }
];

// প্রোডাক্ট স্ক্রিনে দেখানোর ফাংশন
function displayProducts() {
    const container = document.getElementById('products');
    container.innerHTML = '';
    
    MY_PRODUCTS.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="img-container">
                <img src="${p.img}" alt="${p.title}">
            </div>
            <div class="product-info">
                <div class="product-name">${p.title}</div>
                <div><span class="product-desc">${p.desc}</span></div>
            </div>
        `;
        container.appendChild(card);
    });
}

// সাইট লোড হলে রান হবে
displayProducts();
</script>

</body>
</html>
